  Чим вище значення, тим плавніші великі рухи, але менша чутливість.

animated_java.dialog.blueprint_settings.auto_update_rig_orientation.title: Автоматичне оновлення орієнтації рига
animated_java.dialog.blueprint_settings.auto_update_rig_orientation.description: |-
  Коли **увімкнено**, синхронізує позиції та обертання всіх нодових об’єктів із кореневим об’єктом щотика.
  Дозволяє просто телепортувати сутність, щоб перемістити риг.

  Коли **вимкнено**, вам слід використовувати функцію move для переміщення рига:

  ```
  execute as @e[tag=aj.<простір_імен>_root] \
      positioned <x> <y> <z> rotated <yaw> <pitch> run \
      function animated_java:<простір_імен>/move
  ```

  Синхронізація позицій і обертання нодів щотика може створювати навантаження, особливо для великих ригів.
  Вимкнення цього параметра може підвищити продуктивність, але за рахунок зручності.

animated_java.dialog.blueprint_settings.use_storage_for_animation.title: Використовувати сховище для анімації
animated_java.dialog.blueprint_settings.use_storage_for_animation.description: |-
  Якщо увімкнено, сховище NBT використовуватиметься для зберігання даних анімації замість функцій.

  Це значно зменшує обсяг експортованого датапаку, хоча й є набагато менш ефективним.

# Plugin Settings
animated_java.dialog.blueprint_settings.baked_animations.title: Запечені анімації
animated_java.dialog.blueprint_settings.baked_animations.description: |-
  Чи запікати експортовані анімації.
  Запечені кадри анімації заздалегідь обробляються та зберігаються в експортованому файлі JSON, що зменшує складність рендерингу моделі в грі.
  Деякі плагіни потребуватимуть цю опцію для коректної роботи.

