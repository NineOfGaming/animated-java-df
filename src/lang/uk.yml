# Blueprint Setting Errors - Failed to Export Message Box
animated_java.misc.failed_to_export.title: Не вдалося експортувати
animated_java.misc.failed_to_export.custom_models.message: Ви вимкнули експорт ресурспаку, але у вашому проєкті є користувацькі моделі! Будь ласка, увімкніть експорт ресурспаку або видаліть моделі перед експортом.
animated_java.misc.failed_to_export.blueprint_settings.message: У налаштуваннях креслення виявлено помилки! Будь ласка, виправте їх перед експортом.
animated_java.misc.failed_to_export.blueprint_settings.error_item: 'Виявлено помилку з {0}:'
animated_java.misc.failed_to_export.button: ОК
animated_java.misc.failed_to_export.invalid_rotation.message: |-
  Деякі куби у вашій моделі мають неправильні кути повороту!

  Куби повинні мати кут повороту -45, -22,5, 0, 22,5 або 45 градусів і можуть бути повернуті лише навколо однієї осі, якщо вибрано версії Minecraft нижче 1.21.6.

  Якщо ви хочете повернути куб точніше або на кількох осях, перемістіть куб у кістку і повертайте її замість куба.

  Усі неприпустимі куби підсвічені червоним. Будь ласка, виправте їх перед експортом.
animated_java.misc.failed_to_export.invalid_rotation.message_post_1_21_6: |-
  Деякі куби у вашій моделі мають неправильні кути повороту!

  Куби повинні бути повернуті лише навколо однієї осі, якщо вибрано версії Minecraft вище 1.21.6.

  Якщо ви хочете повернути куб точніше або на кількох осях, перемістіть куб у кістку і повертайте її замість куба.

  Усі неприпустимі куби підсвічені червоним. Будь ласка, виправте їх перед експортом.
animated_java.misc.failed_to_export.rig_has_textures_but_no_custom_models.message: |-
  У вашій моделі є текстури, але немає користувацьких моделей (кубів), до яких їх можна застосувати!
  Будь ласка, створіть куби та використовуйте ці текстури, або видаліть текстури перед експортом.
animated_java.misc.failed_to_export.rig_has_custom_models_but_no_textures.message: |-
  У вашій моделі є користувацькі моделі (куби), але немає текстур, які можна застосувати до них!
  Будь ласка, додайте текстури до ваших кубів або видаліть їх перед експортом.

animated_java.toast.invalid_rotations: |-
  Неправильний поворот кубів!

  Куби повинні мати поворот у -45, -22,5, 0, 22,5 або 45 градусів і можуть бути повернуті лише навколо однієї осі, якщо вибрано версії Minecraft нижче 1.21.6.

  Усі неприпустимі куби підсвічені червоним.

animated_java.toast.invalid_rotations_post_1_21_6: |-
  Неправильний поворот кубів!

  Куби можуть бути повернуті тільки навколо однієї осі при виборі версії Minecraft 1.21.6 і вище.

  Усі неприпустимі куби підсвічені червоним.

